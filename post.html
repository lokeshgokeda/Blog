<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Node // Aura</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .reading-progress-bar {
            position: fixed; top: 76px; left: 0; height: 3px;
            background: var(--text-primary); width: 0%; z-index: 1001;
            transition: width 0.08s linear;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                AURA.
            </a>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="reading-progress-bar" id="progress-indicator"></div>

    <main class="container">
        <article id="article-payload">
            <header class="post-header" id="post-header-target"></header>
            
            <div class="post-layout">
                <div>
                    <!-- Primary Content Container -->
                    <div class="post-body" id="post-body-target"></div>
                    
                    <!-- Advanced Interactive Comments UI -->
                    <section class="comments-container">
                        <h3 style="font-size: 1.5rem; font-weight:800; margin-bottom: 2rem;">Interactive Discussion</h3>
                        <form id="comment-form" class="comment-form-group" style="display:flex; flex-direction:column; gap:1rem;">
                            <input type="text" id="commenter-name" placeholder="Your name" required style="padding:0.75rem; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg-card); color:var(--text-primary);">
                            <textarea id="comment-body" rows="3" placeholder="Join the discussion..." required style="padding:1rem; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg-card); color:var(--text-primary); font-family:inherit;"></textarea>
                            <button type="submit" class="btn btn-primary" style="align-self:flex-start;">Submit Comment</button>
                        </form>
                        <div class="comment-list" id="comments-list-target"></div>
                    </section>
                </div>
                
                <aside class="post-sidebar">
                    <div class="toc-title">Table of Contents</div>
                    <nav id="toc-target">
                        <ul class="toc-list" id="toc-list-container"></ul>
                    </nav>
                </aside>
            </div>
        </article>
    </main>

    <script src="blog.js"></script>
    <script src="main.js"></script>
</body>
</html>
